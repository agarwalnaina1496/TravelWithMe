[APP]
agent_engine=n8n
n8n_timeout_seconds=185
langgraph_model_provider=groq
langgraph_model=openai/gpt-oss-120b
generation_max_output_tokens=16384
generation_temperature=0.2
generation_timeout_seconds=180
trusted_hosts=["localhost","127.0.0.1","testserver"]
cors_allowed_origins=[]
requests_per_minute=60
max_request_body_bytes=131072
telemetry_enabled=false
telemetry_payload_mode=metadata
telemetry_max_field_size=16384
