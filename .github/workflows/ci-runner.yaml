name: CI Runner

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci-runner:
    name: CI Runner
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt

      - name: Audit Python dependencies
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: requirements.txt

      - name: Enforce prompt release metadata
        run: python scripts/check_prompt_version_changes.py "origin/${{ github.base_ref }}"

      - name: Run backend tests
        run: python -m pytest -v

      - name: Build hardened container
        run: docker build --tag travelwithme-api:security-check .

      - name: Scan container filesystem
        uses: aquasecurity/trivy-action@0.32.0
        with:
          image-ref: travelwithme-api:security-check
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
