services:
  - type: web
    name: travelwithme-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: prod
      - key: AGENT_ENGINE
        value: n8n
      - key: LANGGRAPH_MODEL_PROVIDER
        value: groq
      - key: LANGGRAPH_MODEL
        value: openai/gpt-oss-120b
      - key: LANGGRAPH_API_KEY
        sync: false
      - key: OTEL_EXPORTER_OTLP_LOGS_ENDPOINT
        sync: false
      - key: OTEL_EXPORTER_OTLP_LOGS_PROTOCOL
        value: http/protobuf
      - key: OTEL_EXPORTER_OTLP_LOGS_HEADERS
        sync: false
      - key: TRUSTED_HOSTS
        value: '["travelwithme-zf9f.onrender.com"]'
      - key: CORS_ALLOWED_ORIGINS
        value: '["https://twm-six.vercel.app"]'
