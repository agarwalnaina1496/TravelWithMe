services:
  - type: web
    name: travelwithme-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: prod
      - key: AGENT_ENGINE
        value: n8n
      - key: LANGGRAPH_MODEL
        value: openai/gpt-oss-120b
      - key: GROQ_API_KEY
        sync: false
