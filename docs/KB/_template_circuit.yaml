# ─────────────────────────────────────────────────────────────
# TWM Circuit Template — Schema v1.0
# ID convention: descriptive slug (e.g. rajasthan_classic,
#   golden_triangle, kerala_complete)
# Enums defined in global_rules.yaml — do not use other values
# ─────────────────────────────────────────────────────────────

schema_version: "1.0"
schema_type: circuit
circuit_id:                        # descriptive slug — stable, never changes

# ── Identification (Permanent) ──────────────────────────────
name:
aliases: []
circuit_type:                      # linear | loop
                                   # linear = point-to-point, different start and end
                                   # loop = starts and ends at or near same city

# ── Character (Permanent) ────────────────────────────────────
circuit_character:                 # one paragraph describing the overall trip feel
primary_experience_types: []       # heritage and history | architecture | nature | wildlife
                                   # culture and bazaars | adventure | beaches | backwaters
                                   # desert landscape | hill landscape | spiritual
not_suitable_for: []               # what kind of traveler or goal this circuit doesn't serve

# ── Stops (Permanent) ────────────────────────────────────────
# name kept for human readability — destination_id is source of truth
# all logic uses destination_id, not name
stops:
  - order:                         # 1-indexed, sequential
    destination_id:                # must match a destination_id in kb/destinations
    name:                          # for readability only
    recommended_nights:
    min_nights:
    role:                          # what this stop contributes to the circuit

# ── Internal Travel (Semi-stable) ────────────────────────────
# distance_km kept — used for travel_metrics computation and validation
internal_travel:
  - from_id:
    from_name:
    to_id:
    to_name:
    distance_km:
    typical_duration_hours:        # "5–6" — always a range, always a string
    recommended_modes: []          # train | cab | self_drive | bus | flight
    notes:

# ── Duration (Permanent) ─────────────────────────────────────
duration:
  minimum_nights:
  optimal_nights:
  maximum_nights:

ideal_trip_length:                 # structured, not a freeform string
  nights:
  days:                            # always nights + 1

# ── Travel Metrics (Permanent) ───────────────────────────────
# total_internal_travel_hours: ingest pipeline computes this by summing
# typical_duration_hours across all internal_travel legs and flags
# mismatches. YAML value is for human review and validation.
travel_metrics:
  total_internal_travel_hours:     # sum of all internal legs
  travel_burden:                   # low (≤4h total) | medium (5–12h) | high (>12h)
  pace:                            # relaxed | balanced | fast
                                   # NOT the same as destination pace —
                                   # this describes the circuit's overall tempo

# ── Circuit Complexity (Permanent) ───────────────────────────
circuit_complexity:
  planning_required:               # low | medium | high
  logistics_difficulty:            # low | medium | high
  first_timer_friendly:            # true | false

# ── Seasonality (Semi-stable) ────────────────────────────────
# Seasonality is for the circuit as a whole — the window when
# ALL stops are in acceptable condition simultaneously
seasonality:
  best_months: []
  acceptable_months: []
  avoid_months: []
  circuit_seasonal_notes:          # explain any per-stop seasonal variation
                                   # and what drives the circuit-level recommendation

# ── Trip Fit (Permanent) ─────────────────────────────────────
trip_goal_fit:
  relaxation:                      # low | medium | high
  adventure:                       # low | medium | high
  celebration:                     # low | medium | high
  cultural:                        # low | medium | high
  workation:                       # low | medium | high
  staycation:                      # low | medium | high

travel_style_fit:
  cultural:                        # low | medium | high
  scenic:                          # low | medium | high
  luxury:                          # low | medium | high
  relaxed:                         # low | medium | high
  adventure:                       # low | medium | high
  nature:                          # low | medium | high
  social:                          # low | medium | high
  road_trip:                       # low | medium | high

group_fit:
  solo:                            # low | medium | high
  couple:                          # low | medium | high
  friends:                         # low | medium | high
  family:                          # low | medium | high

# ── Experience Variety (Permanent) ───────────────────────────
experience_variety:                # low | medium | high
experience_variety_notes:          # explain the variety — name what's distinct
                                   # about each stop and why they don't feel repetitive
                                   # e.g. "Jaipur (forts/bazaars), Jodhpur (desert edge),
                                   # Udaipur (lakes) — each has a distinct character"

# ── Profile (Permanent) ──────────────────────────────────────
known_for: []
known_pinch_points: []             # where this circuit typically goes wrong —
                                   # be specific and honest

# ── Variations (Permanent) ───────────────────────────────────
# Each variation must have its own YAML file in kb/circuits/
# stops lists destination_ids, not names
common_variations:
  - name:
    circuit_id:                    # must have its own YAML file
    stops: []                      # [jaipur_rajasthan, udaipur_rajasthan]
    duration_nights:               # "3–4" — range as string
    notes:

# ── Experience Attributes (Permanent) ────────────────────────
# Circuit-level assessment — average or dominant character across stops
# experience_attributes.pace removed — pace lives in travel_metrics.pace
experience_attributes:
  walkability:                     # low | medium | high
  food_culture:
    quality:                       # low | medium | high
    accessibility:                 # low | medium | high
    street_food:                   # true | false
    notes:
  local_authenticity:              # low | medium | high
  tourist_density:                 # low | moderate | high
  spontaneity_friendly:            # low | medium | high
  visual_character:                # free text — circuit-level visual identity
  discovery_potential:             # low | medium | high

# ── Metadata ─────────────────────────────────────────────────
meta:
  last_updated:                    # YYYY-MM-DD
  data_source:                     # curated | generated | verified
  confidence:                      # low | medium | high
