# ─────────────────────────────────────────────────────────────
# TWM Destination Profile — Schema v1.0
# ID convention: name_region (e.g. coorg_karnataka, ooty_tamilnadu)
# Enums defined in global_rules.yaml — do not use other values
# ─────────────────────────────────────────────────────────────

schema_version: "1.0"
schema_type: destination
destination_id:                    # name_region — stable, never changes

# ── Identification (Permanent) ──────────────────────────────
name:
aliases: []
region:
destination_type: []               # hill station | coastal | heritage | wildlife
                                   # nature | urban | desert | island | backwaters

# ── Access (Permanent) ──────────────────────────────────────
# distance_km kept — determines whether nearest_airport is
# actually accessible or just technically nearest
access:
  nearest_airport:
    name:
    iata:
    distance_km:
  nearest_railhead:
    name:
    distance_km:
  road_accessibility:              # low | medium | high
  self_drive_suitability:          # low | medium | high
  notes:

# ── Seasonality (Semi-stable) ────────────────────────────────
seasonality:
  best_months: []
  acceptable_months: []
  avoid_months: []
  peak_tourist_months: []
  off_peak_months: []
  monsoon_character:               # what happens here during monsoon

# ── Trip Fit (Permanent) ─────────────────────────────────────
trip_goal_fit:
  relaxation:                      # low | medium | high
  adventure:                       # low | medium | high
  celebration:                     # low | medium | high
  workation:                       # low | medium | high
  staycation:                      # low | medium | high

travel_style_fit:
  scenic:                          # low | medium | high
  nature:                          # low | medium | high
  relaxed:                         # low | medium | high
  cultural:                        # low | medium | high
  adventure:                       # low | medium | high
  luxury:                          # low | medium | high
  social:                          # low | medium | high
  road_trip:                       # low | medium | high

group_fit:
  solo:                            # low | medium | high
  couple:                          # low | medium | high
  friends:                         # low | medium | high
  family:                          # low | medium | high

# ── Crowd Profile (Semi-stable) ──────────────────────────────
crowd_profile:
  typical_level:                   # low | moderate | high
  peak_level:                      # low | moderate | high
  off_peak_level:                  # low | moderate | high
  notes:

# ── Cost (Semi-stable) ───────────────────────────────────────
cost:
  tier:                            # budget | mid | premium
  typical_per_person_per_day:
    budget:                        # "800–1200" — always a range, always a string
    mid:                           # "2000–3500"
    premium:                       # "5000–8000"
  notes:

# ── Destination Profile (Permanent) ──────────────────────────
destination_profile:
  known_for: []
  primary_activities: []
  not_suitable_for: []
  trekking_required:               # true | false
  beach:                           # true | false
  mountains:                       # true | false
  wildlife:                        # low | medium | high
  nightlife:                       # low | medium | high
  connectivity:                    # low | medium | high

# ── Destination Complexity (Permanent) ───────────────────────
destination_complexity:
  planning_required:               # low | medium | high
  logistics_difficulty:            # low | medium | high
  first_timer_friendly:            # true | false

# ── Experience Attributes (Permanent) ────────────────────────
experience_attributes:
  walkability:                     # low | medium | high
  navigability:                    # low | medium | high — ease of getting around without planning
  food_culture:
    quality:                       # low | medium | high
    accessibility:                 # low | medium | high — can you find good food without research
    street_food:                   # true | false
    notes:
  local_authenticity:              # low | medium | high
  tourist_density:                 # low | moderate | high — ratio of tourists to locals
  spontaneity_friendly:            # low | medium | high — can you figure things out as you go
  visual_character:                # free text — what makes it visually distinctive
  pace:                            # relaxed | balanced | fast
  discovery_potential:             # low | medium | high

# ── Strengths (Permanent) ────────────────────────────────────
destination_strengths: []          # what this destination is particularly good at
uniqueness_notes:                  # what sets it apart from similar destinations

# ── Metadata ─────────────────────────────────────────────────
meta:
  last_updated:                    # YYYY-MM-DD
  data_source:                     # curated | generated | verified
  confidence:                      # low | medium | high
