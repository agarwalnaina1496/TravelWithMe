uniqueness_factor:
  - High-altitude cold desert landscape in the trans-Himalayan region of Himachal Pradesh.
  - Strong Tibetan Buddhist cultural presence through monasteries such as Key, Tabo, and Dhankar.
  - Includes fragile high-altitude habitats such as Pin Valley National Park, Kibber Wildlife Sanctuary, and Chandratal Wetland.
  - Kaza functions as the main travel base and commercial centre for most Spiti itineraries.

